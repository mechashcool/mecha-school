{% extends "shared/base.html" %}
{% block title %}تم إضافة الطالب{% endblock %}
{% block page_title %}تم إضافة الطالب{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">تم إضافة الطالب</h1>
  </div>
</div>

<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card text-center py-5">
      <div class="card-body">
        <div style="font-size:56px;color:var(--success,#28a745);margin-bottom:16px">
          <i class="bi bi-person-check-fill"></i>
        </div>
        <h4 class="mb-1">{{ student.full_name }}</h4>
        <p class="text-muted mb-4">{{ student.student_id }}</p>

        <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center">
          <a href="{{ url_for('students.view', student_id=student.id) }}"
             class="btn btn-outline-primary px-4">
            <i class="bi bi-person-lines-fill me-2"></i>عرض الطالب
          </a>
          <a href="{{ url_for('fees.create', student_id=student.id) }}"
             class="btn btn-primary px-4">
            <i class="bi bi-cash-coin me-2"></i>إضافة رسم لهذا الطالب
          </a>
        </div>

        <div class="mt-4">
          <a href="{{ url_for('students.create') }}" class="text-muted small">
            <i class="bi bi-plus-circle me-1"></i>إضافة طالب آخر
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
