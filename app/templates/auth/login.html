<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — المهندس</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    :root {
      --primary:  #1a3a5c;
      --accent:   #e8a020;
      --bg:       #0f2540;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }

    /* Geometric background */
    body::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 80% 20%, rgba(232,160,32,.15) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 80%, rgba(26,58,92,.8)    0%, transparent 50%);
    }

    .pattern {
      position: absolute; inset: 0; opacity: .04;
      background-image: repeating-linear-gradient(
        45deg,
        #fff 0, #fff 1px, transparent 0, transparent 50%
      );
      background-size: 30px 30px;
    }

    /* Card */
    .login-card {
      position: relative; z-index: 10;
      width: 100%; max-width: 440px;
      background: rgba(255,255,255,.97);
      border-radius: 20px;
      box-shadow: 0 30px 80px rgba(0,0,0,.4);
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, var(--primary), #22508a);
      padding: 36px 40px 30px;
      text-align: center;
      position: relative;
    }
    .login-header::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 20px;
      background: rgba(255,255,255,.97);
      clip-path: ellipse(60% 100% at 50% 100%);
    }

    .logo-circle {
      width: 68px; height: 68px;
      background: var(--accent);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 900; color: #fff;
      margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(232,160,32,.4);
    }
    .login-header h1 {
      color: #fff; font-size: 22px; font-weight: 800; margin: 0;
    }
    .login-header p {
      color: rgba(255,255,255,.7); font-size: 13px; margin: 4px 0 0;
    }

    .login-body { padding: 34px 40px 36px; }

    .form-label {
      font-weight: 700; font-size: 13px; color: #1e2b3a; margin-bottom: 7px;
    }
    .input-group-text {
      background: #f0f4f8; border-color: #dde3ec;
      color: #6b7a8d; border-radius: 0 10px 10px 0;
    }
    .form-control {
      border: 1.5px solid #dde3ec; border-radius: 10px 0 0 10px;
      font-size: 14px; padding: 11px 16px;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,58,92,.1);
    }

    .btn-login {
      background: linear-gradient(135deg, var(--primary), #22508a);
      color: #fff; border: none;
      width: 100%; padding: 13px;
      border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity .2s, transform .1s;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: .93; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    .alert-custom {
      background: #fef0f0; color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 10px; padding: 11px 16px;
      font-size: 13.5px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }

    .login-footer {
      text-align: center;
      padding: 16px 40px;
      background: #f8fafc;
      border-top: 1px solid #eef2f7;
      font-size: 12px; color: #9aabb8;
    }

    .form-check-label { font-size: 13px; color: #4a5568; font-weight: 500; }

    /* Floating shapes */
    .shape {
      position: absolute; border-radius: 50%;
      background: rgba(232,160,32,.08);
    }
    .shape-1 { width:300px; height:300px; top:-100px; left:-100px; }
    .shape-2 { width:200px; height:200px; bottom:-60px; right:-60px; }
    .shape-3 { width:120px; height:120px; top:40%; left:5%; }
  </style>
</head>
<body>
  <div class="pattern"></div>
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>

  <div class="login-card">
    <div class="login-header">
      <div class="logo-circle">م</div>
      <h1>المهندس</h1>
      <p>نظام إدارة المدرسة الخاصة</p>
    </div>

    <div class="login-body">
      <h2 style="font-size:18px;font-weight:800;color:#1e2b3a;margin-bottom:22px">
        تسجيل الدخول
      </h2>

      {% if error %}
      <div class="alert-custom">
        <i class="bi bi-exclamation-circle-fill"></i>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-4">
          <label class="form-label">اسم المستخدم أو البريد الإلكتروني</label>
          <div class="input-group">
            <input type="text" name="username" class="form-control"
                   placeholder="أدخل اسم المستخدم"
                   required autofocus value="{{ request.form.get('username','') }}">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">كلمة المرور</label>
          <div class="input-group">
            <input type="password" name="password" id="passwordInput"
                   class="form-control" placeholder="أدخل كلمة المرور" required>
            <span class="input-group-text" style="cursor:pointer" onclick="togglePwd()">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </span>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="remember" id="rememberMe">
            <label class="form-check-label" for="rememberMe">تذكرني</label>
          </div>
        </div>

        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>تسجيل الدخول
        </button>
      </form>
    </div>

    <div class="login-footer">
      © {{ now.year }} شركة المهندس — جميع الحقوق محفوظة
    </div>
  </div>

  <script>
    function togglePwd() {
      const inp = document.getElementById('passwordInput');
      const ico = document.getElementById('eyeIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        ico.className = 'bi bi-eye-slash';
      } else {
        inp.type = 'password';
        ico.className = 'bi bi-eye';
      }
    }
  </script>
</body>
</html>
