{% extends "shared/base.html" %}
{% block title %}تسجيل حركة مخزن{% endblock %}
{% block page_title %}تسجيل حركة مخزن{% endblock %}

{% block content %}
<div class="page-header">
  <div><h1 class="page-title">تسجيل حركة مخزن</h1></div>
  <a href="{{ url_for('inventory.movements') }}" class="btn btn-outline-secondary">رجوع</a>
</div>

<div class="card">
  <div class="card-body">
    <form method="POST" class="row g-3">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">
      <div class="col-md-6">
        <label class="form-label">المادة <span class="text-danger">*</span></label>
        <select name="item_id" class="form-select" required>
          <option value="">اختر المادة</option>
          {% for item in items %}
          <option value="{{ item.id }}" {% if selected_item_id == item.id %}selected{% endif %}>
            {{ item.name }}{% if item.size %} [{{ item.size }}]{% endif %} - المتوفر: {{ item.current_quantity }} {{ item.unit }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">نوع الحركة</label>
        <select name="movement_type" class="form-select" required>
          {% for key, label in movement_types.items() %}
          <option value="{{ key }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">الكمية</label>
        <input type="number" name="quantity" class="form-control" step="0.01" min="0.01" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">السبب</label>
        <select name="reason" class="form-select" required>
          {% for reason in reasons %}
          <option value="{{ reason }}">{{ reason }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">التاريخ</label>
        <input type="date" name="movement_date" class="form-control" value="{{ today.strftime('%Y-%m-%d') if today else '' }}" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">المستلم / الجهة</label>
        <input type="text" name="recipient" class="form-control">
      </div>
      <div class="col-12">
        <label class="form-label">ملاحظات</label>
        <textarea name="notes" class="form-control" rows="3"></textarea>
      </div>
      <div class="col-12 d-flex gap-2">
        <button class="btn btn-primary">حفظ</button>
        <a href="{{ url_for('inventory.movements') }}" class="btn btn-outline-secondary">إلغاء</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
