<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body { font-family:'Cairo',sans-serif; background:#0f2540; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  .box { background:#fff; border-radius:20px; padding:48px 56px; text-align:center; max-width:460px; }
  .code { font-size:72px; font-weight:900; color:#e8a020; line-height:1; }
  h2 { font-size:22px; font-weight:800; color:#1e2b3a; margin:10px 0 8px; }
  p { color:#6b7a8d; font-size:14px; margin-bottom:28px; }
  a { background:#1a3a5c; color:#fff; text-decoration:none; padding:12px 32px; border-radius:10px; font-weight:700; }
</style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h2>الصفحة غير موجودة</h2>
    <p>الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
    <a href="/">العودة للرئيسية</a>
  </div>
</body>
</html>
