{% extends "shared/base.html" %}
{% block title %}تعديل مادة{% endblock %}
{% block page_title %}تعديل مادة: {{ subject.name }}{% endblock %}

{% block content %}
<div class="page-header">
  <div><h1 class="page-title">تعديل: {{ subject.name }}</h1></div>
  <a href="{{ url_for('sections.subjects') }}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-right me-1"></i>رجوع
  </a>
</div>
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body">
        <form method="POST" action="{{ url_for('sections.edit_subject', sub_id=subject.id) }}">
          <div class="mb-3">
            <label class="form-label">الرمز</label>
            <div class="form-control bg-light">{{ subject.code }}</div>
          </div>
          <div class="mb-3">
            <label class="form-label">الاسم <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control"
                   value="{{ subject.name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">المرحلة</label>
            <select name="stage" class="form-select" id="editStage">
              <option value="">— اختر المرحلة —</option>
              {% for st in stages %}
              <option value="{{ st }}" {% if subject.stage == st %}selected{% endif %}>
                المرحلة {{ st }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">الصف</label>
            <select name="grade_id" class="form-select" id="editGrade">
              <option value="">— اختر الصف —</option>
              {% for g in grades %}
              <option value="{{ g.id }}"
                      data-stage="{{ g.stage or '' }}"
                      {% if subject.grade_id == g.id %}selected{% endif %}>
                {{ g.name }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label">الدرجة الكلية</label>
              <input type="number" name="total_marks" class="form-control"
                     min="0" step="0.5"
                     value="{{ subject.total_marks | int if subject.total_marks else '' }}"
                     placeholder="100">
            </div>
            <div class="col-6">
              <label class="form-label">درجة النجاح</label>
              <input type="number" name="pass_marks" class="form-control"
                     min="0" step="0.5"
                     value="{{ subject.pass_marks | int if subject.pass_marks else '' }}"
                     placeholder="50">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">الوصف</label>
            <textarea name="description" class="form-control" rows="3">{{ subject.description or '' }}</textarea>
          </div>
          <div class="d-flex gap-3 mt-4">
            <button type="submit" class="btn btn-primary px-5">حفظ</button>
            <a href="{{ url_for('sections.subjects') }}" class="btn btn-outline-secondary px-4">إلغاء</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  const stageEl = document.getElementById('editStage');
  const gradeEl = document.getElementById('editGrade');
  const allGradeOptions = Array.from(gradeEl.options).slice(1);

  function filterGrades() {
    const stage = stageEl.value;
    for (const opt of allGradeOptions) {
      opt.hidden = stage ? opt.dataset.stage !== stage : false;
    }
  }
  stageEl.addEventListener('change', filterGrades);
  filterGrades();
})();
</script>
{% endblock %}
